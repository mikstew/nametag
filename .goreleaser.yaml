version: 2
project_name: nametag

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/nametag
    env:
      - CGO_ENABLED=1
    # Fyne uses CGO; Linux binaries cannot be cross-compiled from macOS.
    # Use GitHub Actions for multi-platform releases, or run GoReleaser on Linux.
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -extldflags=-Wl,-no_warn_duplicate_libraries
      - -X github.com/mikio/nametag/internal/config.Version={{.Version}}
    binary: nametag

archives:
  - format: binary
    name_template: "nametag-{{ .Os }}-{{ .Arch }}"

release:
  github:
    owner: mikio
    name: nametag

changelog:
  disable: true
