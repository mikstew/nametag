version: 2
project_name: nametag

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/nametag
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mikio/nametag/internal/config.Version={{.Version}}
    binary: nametag

archives:
  - format: binary
    name_template: "nametag-{{ .Os }}-{{ .Arch }}"

release:
  github:
    owner: mikio
    name: nametag

changelog:
  disable: true
