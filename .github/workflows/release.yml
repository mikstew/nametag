name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            goos: darwin
            goarch: arm64
          - runner: macos-latest
            goos: darwin
            goarch: amd64
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - runner: windows-latest
            goos: windows
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgl1-mesa-dev xorg-dev

      - name: Build
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LDFLAGS="-s -w -X github.com/mikio/nametag/internal/config.Version=${VERSION}"
          if [ "${{ matrix.goos }}" = "darwin" ]; then
            LDFLAGS="${LDFLAGS} -extldflags=-Wl,-no_warn_duplicate_libraries"
          fi
          OUTPUT="nametag-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi
          go build \
            -ldflags "${LDFLAGS}" \
            -o "${OUTPUT}" \
            ./cmd/nametag
          echo "output=${OUTPUT}" >> "${GITHUB_OUTPUT}"
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: nametag-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ steps.build.outputs.output }}

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum nametag-darwin-* nametag-linux-* nametag-windows-* > checksums.txt
          cat checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**/*
